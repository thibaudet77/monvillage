<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Admin - MonVillage</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 90%;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo {
            background: linear-gradient(135deg, #2c5530 0%, #4a7c59 100%);
            color: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 24px;
        }

        .login-title {
            font-size: 24px;
            color: #2c5530;
            margin-bottom: 10px;
        }

        .login-subtitle {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        .form-input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: #4a7c59;
        }

        .otp-input {
            text-align: center;
            font-size: 24px;
            letter-spacing: 8px;
            font-weight: 700;
        }

        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #2c5530 0%, #4a7c59 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
            margin-bottom: 20px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .back-link {
            text-align: center;
        }

        .back-link a {
            color: #4a7c59;
            text-decoration: none;
            font-size: 14px;
            cursor: pointer;
        }

        .back-link a:hover {
            text-decoration: underline;
        }

        .alert {
            padding: 12px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .alert-error {
            background: #fee;
            border: 1px solid #fcc;
            color: #a00;
        }

        .alert-success {
            background: #efe;
            border: 1px solid #cfc;
            color: #060;
        }

        .alert-info {
            background: #e8f4fd;
            border: 1px solid #b8daff;
            color: #004085;
        }

        .hidden {
            display: none;
        }

        .otp-info {
            background: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 6px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #495057;
            text-align: center;
        }

        .otp-info i {
            color: #4a7c59;
            margin-right: 5px;
        }

        .resend-link {
            text-align: center;
            margin-bottom: 15px;
        }

        .resend-link a {
            color: #4a7c59;
            text-decoration: none;
            font-size: 13px;
            cursor: pointer;
        }

        .resend-link a:hover {
            text-decoration: underline;
        }

        .timer {
            font-size: 12px;
            color: #999;
            text-align: center;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo">
                <i class="fas fa-map-marked-alt"></i>
            </div>
            <h1 class="login-title">Administration</h1>
            <p class="login-subtitle">Acces a l'interface d'administration MonVillage</p>
        </div>

        <div id="alertContainer"></div>

        <!-- Etape 1 : Email + Mot de passe -->
        <form id="loginForm">
            <div class="form-group">
                <label for="email" class="form-label">
                    <i class="fas fa-envelope"></i> Email
                </label>
                <input type="email" id="email" class="form-input" required
                       placeholder="votre.email@exemple.com">
            </div>

            <div class="form-group">
                <label for="password" class="form-label">
                    <i class="fas fa-lock"></i> Mot de passe
                </label>
                <input type="password" id="password" class="form-input" required
                       placeholder="Votre mot de passe">
            </div>

            <button type="submit" class="login-btn" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> Se connecter
            </button>
        </form>

        <!-- Etape 2 : Verification OTP -->
        <div id="otpStep" class="hidden">
            <div class="otp-info">
                <i class="fas fa-shield-alt"></i>
                Un code de verification a 6 chiffres a ete envoye a votre adresse email.
                Consultez votre boite de reception (et vos spams).
            </div>

            <form id="otpForm">
                <div class="form-group">
                    <label for="otpCode" class="form-label">
                        <i class="fas fa-key"></i> Code OTP
                    </label>
                    <input type="text" id="otpCode" class="form-input otp-input"
                           required maxlength="6" pattern="[0-9]{6}"
                           placeholder="000000" autocomplete="one-time-code"
                           inputmode="numeric">
                </div>

                <div id="timer" class="timer"></div>

                <button type="submit" class="login-btn" id="verifyBtn">
                    <i class="fas fa-check-circle"></i> Verifier le code
                </button>
            </form>

            <div class="resend-link">
                <a id="resendBtn" onclick="resendOtp()">
                    <i class="fas fa-redo"></i> Renvoyer le code
                </a>
            </div>

            <div class="back-link">
                <a onclick="backToLogin()">
                    <i class="fas fa-arrow-left"></i> Retour a la connexion
                </a>
            </div>
        </div>

        <div id="mainBackLink" class="back-link">
            <a href="index.html">
                <i class="fas fa-arrow-left"></i> Retour a l'application
            </a>
        </div>
    </div>

    <!-- Supabase JS -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        const SUPABASE_URL = 'https://hrlufnjhwhgddxkpyzst.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhybHVmbmpod2hnZGR4a3B5enN0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTI3MzIwMzcsImV4cCI6MjA2ODMwODAzN30.0gMYonFDAU84i3boEIKZDK4OQhDrAXXJySGDa80wTZ8';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let authenticatedUser = null;
        let otpTimerInterval = null;
        let otpExpiresAt = null;
        let currentEmail = '';

        function showAlert(message, type = 'error') {
            const container = document.getElementById('alertContainer');
            container.innerHTML = `
                <div class="alert alert-${type}">
                    <i class="fas fa-${type === 'error' ? 'exclamation-triangle' : type === 'success' ? 'check-circle' : 'info-circle'}"></i>
                    ${message}
                </div>
            `;
            if (type !== 'info') {
                setTimeout(() => { container.innerHTML = ''; }, 5000);
            }
        }

        function startTimer(seconds) {
            if (otpTimerInterval) clearInterval(otpTimerInterval);
            otpExpiresAt = Date.now() + seconds * 1000;

            function updateTimer() {
                const remaining = Math.max(0, Math.ceil((otpExpiresAt - Date.now()) / 1000));
                if (remaining <= 0) {
                    clearInterval(otpTimerInterval);
                    document.getElementById('timer').textContent = 'Code expire. Veuillez en demander un nouveau.';
                    document.getElementById('resendBtn').style.display = 'inline';
                    return;
                }
                const min = Math.floor(remaining / 60);
                const sec = remaining % 60;
                document.getElementById('timer').textContent = `Code valide pendant ${min}:${sec.toString().padStart(2, '0')}`;
            }
            updateTimer();
            otpTimerInterval = setInterval(updateTimer, 1000);
        }

        async function checkAdminPermissions(userId) {
            try {
                const { data, error } = await supabaseClient
                    .from('admin_profiles')
                    .select('*')
                    .eq('id', userId)
                    .eq('is_active', true)
                    .single();
                if (error) return false;
                return data !== null;
            } catch (error) {
                return false;
            }
        }

        async function sendOtp(email) {
            // Utilise le systeme OTP natif de Supabase Auth (envoie un code par email)
            const { error } = await supabaseClient.auth.signInWithOtp({
                email: email,
                options: {
                    shouldCreateUser: false
                }
            });
            if (error) throw error;
        }

        // Etape 1 : Connexion par mot de passe
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');

            loginBtn.disabled = true;
            loginBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verification...';

            try {
                // Verifier les identifiants (mot de passe)
                const { data: authData, error: authError } = await supabaseClient.auth.signInWithPassword({
                    email: email,
                    password: password
                });

                if (authError) throw new Error(authError.message);
                if (!authData.user) throw new Error('Erreur d\'authentification');

                // Verifier les permissions administrateur
                const isAdmin = await checkAdminPermissions(authData.user.id);
                if (!isAdmin) {
                    await supabaseClient.auth.signOut();
                    throw new Error('Acces non autorise. Vous devez etre administrateur.');
                }

                authenticatedUser = authData.user;
                currentEmail = email;

                // Deconnecter temporairement (on va re-authentifier avec OTP)
                await supabaseClient.auth.signOut();

                // Envoyer le code OTP par email
                await sendOtp(email);

                // Passer a l'etape 2
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('mainBackLink').classList.add('hidden');
                document.getElementById('otpStep').classList.remove('hidden');
                showAlert(`Un code de verification a ete envoye a ${email}`, 'info');
                startTimer(600);
                document.getElementById('otpCode').focus();

            } catch (error) {
                showAlert(error.message || 'Erreur lors de la connexion');
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Se connecter';
            }
        });

        // Etape 2 : Verification du code OTP
        document.getElementById('otpForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const otpCode = document.getElementById('otpCode').value.trim();
            const verifyBtn = document.getElementById('verifyBtn');

            if (otpCode.length !== 6) {
                showAlert('Veuillez saisir un code a 6 chiffres.');
                return;
            }

            verifyBtn.disabled = true;
            verifyBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Verification...';

            try {
                if (Date.now() > otpExpiresAt) {
                    throw new Error('Le code a expire. Veuillez en demander un nouveau.');
                }

                // Verifier le code OTP via Supabase Auth
                const { data, error } = await supabaseClient.auth.verifyOtp({
                    email: currentEmail,
                    token: otpCode,
                    type: 'email'
                });

                if (error) {
                    throw new Error('Code incorrect. Veuillez reessayer.');
                }

                // Mettre a jour le profil admin
                await supabaseClient
                    .from('admin_profiles')
                    .update({
                        two_factor_enabled: true,
                        last_login: new Date().toISOString()
                    })
                    .eq('id', authenticatedUser.id);

                // Stocker la session
                sessionStorage.setItem('adminLoggedIn', 'true');
                sessionStorage.setItem('adminEmail', authenticatedUser.email);
                sessionStorage.setItem('adminUserId', authenticatedUser.id);
                sessionStorage.setItem('otpVerified', 'true');

                showAlert('Verification reussie ! Redirection...', 'success');

                if (otpTimerInterval) clearInterval(otpTimerInterval);

                setTimeout(() => {
                    window.location.href = 'admin.html';
                }, 1500);

            } catch (error) {
                showAlert(error.message);
                verifyBtn.disabled = false;
                verifyBtn.innerHTML = '<i class="fas fa-check-circle"></i> Verifier le code';
            }
        });

        async function resendOtp() {
            if (!currentEmail) return;
            document.getElementById('resendBtn').style.display = 'none';

            try {
                await sendOtp(currentEmail);
                startTimer(600);
                showAlert('Un nouveau code a ete envoye.', 'success');
            } catch (error) {
                showAlert('Erreur lors du renvoi du code. Reessayez dans quelques instants.');
                document.getElementById('resendBtn').style.display = 'inline';
            }
        }

        function backToLogin() {
            if (otpTimerInterval) clearInterval(otpTimerInterval);
            authenticatedUser = null;
            currentEmail = '';
            document.getElementById('otpStep').classList.add('hidden');
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('mainBackLink').classList.remove('hidden');
            document.getElementById('alertContainer').innerHTML = '';
            document.getElementById('otpCode').value = '';
            document.getElementById('loginBtn').disabled = false;
            document.getElementById('loginBtn').innerHTML = '<i class="fas fa-sign-in-alt"></i> Se connecter';
        }
    </script>
</body>
</html>
